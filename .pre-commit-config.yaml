repos:
  # Generelle checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace        # Fjern trailing whitespace
      - id: end-of-file-fixer          # Sikr newline ved slutning af fil
      - id: check-yaml                 # Valider YAML-filer
      - id: check-added-large-files    # Bloker filer > 5MB
        args: ['--maxkb=5000']
      - id: detect-private-key         # Bloker private SSH-nøgler
      - id: check-merge-conflict       # Bloker uløste merge-konflikter

  # Hardcodede secrets / API keys
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']

  # PEP8 / Flake8 linting
  - repo: https://github.com/PyCQA/flake8
    rev: 7.2.0
    hooks:
      - id: flake8
        args: ['--max-line-length=100', '--exclude=venv,__pycache__']
        files: ^src/
